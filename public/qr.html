<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR 코드 인쇄</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'Noto Sans KR', BlinkMacSystemFont, sans-serif;
    background: #F5F0EB;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    gap: 24px;
  }

  .print-btn {
    background: #6B4226;
    color: white;
    border: none;
    padding: 12px 32px;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: opacity 0.2s;
  }
  .print-btn:hover { opacity: 0.85; }

  /* 카드 */
  .card {
    width: 340px;
    background: white;
    border-radius: 32px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(107,66,38,0.18);
  }

  /* 상단 헤더 */
  .card-top {
    background: linear-gradient(145deg, #6B4226 0%, #9B6542 60%, #C4945A 100%);
    padding: 32px 24px 28px;
    text-align: center;
    position: relative;
  }
  .card-top::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 32px;
    background: white;
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }
  .cafe-icon {
    font-size: 52px;
    margin-bottom: 10px;
    display: block;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
  }
  .cafe-name {
    font-size: 26px;
    font-weight: 900;
    color: white;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .cafe-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    margin-top: 5px;
    font-weight: 500;
  }

  /* QR 영역 */
  .qr-area {
    padding: 12px 24px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .qr-label {
    font-size: 13px;
    font-weight: 700;
    color: #6B4226;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .qr-box {
    background: white;
    border: 3px solid #F0E4D8;
    border-radius: 20px;
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qr-box img, .qr-box canvas { border-radius: 8px; }

  /* 스텝 안내 */
  .steps {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .step {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #FBF6F2;
    border-radius: 14px;
    padding: 10px 14px;
  }
  .step-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6B4226, #9B6542);
    color: white;
    font-size: 13px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .step-text { font-size: 13px; color: #5C3D24; font-weight: 600; line-height: 1.4; }

  /* 하단 */
  .card-bottom {
    background: linear-gradient(135deg, #6B4226, #9B6542);
    padding: 14px 24px;
    text-align: center;
  }
  .reward-text {
    color: white;
    font-size: 13px;
    font-weight: 700;
    opacity: 0.95;
  }
  .reward-highlight {
    font-size: 15px;
    font-weight: 900;
    margin-top: 2px;
  }

  /* 로딩 */
  .loading { color: #999; font-size: 14px; text-align: center; padding: 20px; }

  @media print {
    body { background: white; padding: 0; justify-content: flex-start; padding-top: 20px; }
    .print-btn { display: none; }
    .card { box-shadow: none; margin: 0 auto; }
  }
</style>
</head>
<body>

<button class="print-btn" onclick="window.print()">🖨️ 인쇄하기</button>

<div class="card" id="card">
  <div class="loading">불러오는 중...</div>
</div>

<script>
var SUPABASE_URL = 'https://vaepdtquinftazrcfsdi.supabase.co';
var SUPABASE_KEY = 'sb_publishable_ImT7BXe37H-_GqPHDZscDg__JM2JBpU';
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function init() {
  var { data: rows } = await sb.from('settings').select('*');
  var settings = {};
  (rows || []).forEach(function(r) {
    settings[r.key] = r.key === 'stampsRequired' ? parseInt(r.value) : r.value;
  });

  var cafeName    = settings.cafeName    || '내 카페';
  var reward      = settings.reward      || '아메리카노 1잔 무료';
  var stampsReq   = settings.stampsRequired || 12;
  var registerUrl = settings.registerUrl || '';

  var qrUrl = '';
  if (registerUrl) {
    var params = new URLSearchParams({ cafe: cafeName, req: String(stampsReq) });
    qrUrl = registerUrl + (registerUrl.includes('?') ? '&' : '?') + params.toString();
  }

  var card = document.getElementById('card');
  card.innerHTML = \`
    <div class="card-top">
      <span class="cafe-icon">☕</span>
      <div class="cafe-name">\${cafeName}</div>
      <div class="cafe-sub">도장 쿠폰 멤버십</div>
    </div>
    <div class="qr-area">
      <div class="qr-label">📱 QR 스캔으로 멤버십 등록</div>
      <div class="qr-box" id="qrBox">
        \${qrUrl ? '' : '<div style="padding:20px;color:#CCC;font-size:13px;">설정에서 등록 URL을 먼저 입력해주세요</div>'}
      </div>
      <div class="steps">
        <div class="step">
          <div class="step-num">1</div>
          <div class="step-text">QR 코드를 스캔해 멤버십 등록</div>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <div class="step-text">음료 주문 시 도장 적립 요청</div>
        </div>
        <div class="step">
          <div class="step-num">3</div>
          <div class="step-text">도장 \${stampsReq}개 모으면 쿠폰 교환!</div>
        </div>
      </div>
    </div>
    <div class="card-bottom">
      <div class="reward-text">🎁 도장 \${stampsReq}개 달성 시</div>
      <div class="reward-text reward-highlight">\${reward}</div>
    </div>
  \`;

  if (qrUrl) {
    new QRCode(document.getElementById('qrBox'), {
      text: qrUrl,
      width: 220,
      height: 220,
      colorDark: '#3E2010',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  }
}

init();
</script>
</body>
</html>
